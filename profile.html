<!doctype html>
<html>
  <head>
    <title>Profile</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- HEADER -->
    <div class="profile-header">
      <div class="profile-banner"></div>

      <div class="profile-info">
        <img id="avatar" class="profile-avatar" />
        <h2 id="username"></h2>
      </div>
    </div>

    <!-- PRODUCTS -->
    <div class="container">
      <h3>Your Products</h3>
      <div id="product-list"></div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

      import {
        getFirestore,
        collection,
        query,
        where,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      import {
        getAuth,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      // CONFIG
      const firebaseConfig = {
        apiKey: "AIzaSyBLTbTBct5J8trw8wSaCQ9jMFtzLd0mB3M",
        authDomain: "new-a6.firebaseapp.com",
        projectId: "new-a6",
        storageBucket: "new-a6.firebasestorage.app",
        messagingSenderId: "147870885951",
        appId: "1:147870885951:web:50ae6057e1b97054e8308a",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);

      const avatar = document.getElementById("avatar");
      const usernameEl = document.getElementById("username");
      const productList = document.getElementById("product-list");

      // FORMAT PRICE
      function formatVND(price) {
        return Number(price).toLocaleString("vi-VN") + "₫";
      }

      // USER STATE
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          alert("Login first!");
          window.location.href = "login.html";
          return;
        }

        const name = user.displayName || user.email;

        // 👤 hiển thị info
        avatar.src = `https://ui-avatars.com/api/?name=${name}&size=200`;
        usernameEl.innerText = name;

        // 🧴 load sản phẩm của user
        const q = query(collection(db, "products"), where("user", "==", name));

        onSnapshot(q, (snapshot) => {
          productList.innerHTML = "";

          snapshot.forEach((doc) => {
            const p = doc.data();

            productList.innerHTML += `
        <div class="product" onclick="goToProduct('${doc.id}')">
          <img src="${p.image}">

          <div class="product-content">
            <h3>${p.name}</h3>
            <p>${formatVND(p.price)}</p>
          </div>
        </div>
      `;
          });
        });
      });

      // GO PRODUCT
      window.goToProduct = (id) => {
        window.location.href = "product.html?id=" + id;
      };
    </script>
  </body>
</html>
