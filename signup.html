<!doctype html>
<html>
  <head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Sign Up</h2>

      <input type="text" id="username" placeholder="Username" />
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />

      <button id="signup">Create Account</button>

      <p>Already have account? <a href="login.html">Login</a></p>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

      import {
        getAuth,
        createUserWithEmailAndPassword,
        updateProfile,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      import {
        getFirestore,
        collection,
        addDoc,
        query,
        where,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBLTbTBct5J8trw8wSaCQ9jMFtzLd0mB3M",
        authDomain: "new-a6.firebaseapp.com",
        projectId: "new-a6",
        storageBucket: "new-a6.firebasestorage.app",
        messagingSenderId: "147870885951",
        appId: "1:147870885951:web:50ae6057e1b97054e8308a",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      const username = document.getElementById("username");
      const email = document.getElementById("email");
      const password = document.getElementById("password");

      document.getElementById("signup").onclick = async () => {
        try {
          // ✅ validate
          if (!username.value || !email.value || !password.value) {
            alert("Fill all fields!");
            return;
          }

          if (password.value.length < 6) {
            alert("Password must be at least 6 characters!");
            return;
          }

          // 🔐 tạo tài khoản
          const userCred = await createUserWithEmailAndPassword(
            auth,
            email.value,
            password.value,
          );

          // 👤 lưu username vào Auth
          await updateProfile(userCred.user, {
            displayName: username.value,
          });

          // 💾 lưu vào Firestore
          await addDoc(collection(db, "users"), {
            uid: userCred.user.uid,
            email: emailValue,
            username: usernameValue,
          });

          alert("Account created!");
          window.location.href = "login.html";
        } catch (err) {
          console.error(err);
          alert(err.message);
        }
      };

      document.getElementById("signup").onclick = async () => {
        const btn = document.getElementById("signup");

        try {
          const usernameValue = username.value.trim();
          const emailValue = email.value.trim();
          const passwordValue = password.value.trim();

          if (!usernameValue || !emailValue || !passwordValue) {
            alert("Fill all fields!");
            return;
          }

          if (usernameValue.length < 3) {
            alert("Username too short!");
            return;
          }

          if (passwordValue.length < 6) {
            alert("Password must be at least 6 characters!");
            return;
          }

          // 🔥 check trùng username
          const q = query(
            collection(db, "users"),
            where("username", "==", usernameValue),
          );

          const snap = await getDocs(q);

          if (!snap.empty) {
            alert("Username already taken!");
            return;
          }

          btn.disabled = true;
          btn.innerText = "Creating...";

          const userCred = await createUserWithEmailAndPassword(
            auth,
            emailValue,
            passwordValue,
          );

          await updateProfile(userCred.user, {
            displayName: usernameValue,
          });

          await addDoc(collection(db, "users"), {
            uid: userCred.user.uid,
            email: emailValue,
            username: usernameValue,
          });

          alert("Account created!");
          window.location.href = "login.html";
        } catch (err) {
          console.error(err);
          alert(err.message);
        }
      };
    </script>
  </body>
</html>
