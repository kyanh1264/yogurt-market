<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <a href="index.html">⬅ Back</a>

      <div id="product-detail"></div>

      <h3>Comments</h3>
      <div id="comments"></div>

      <input type="text" id="commentInput" placeholder="Write comment..." />
      <button id="send">Send</button>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

      import {
        getFirestore,
        doc,
        getDoc,
        collection,
        addDoc,
        onSnapshot,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      import {
        getAuth,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      // CONFIG
      const firebaseConfig = {
        apiKey: "AIzaSyBLTbTBct5J8trw8wSaCQ9jMFtzLd0mB3M",
        authDomain: "new-a6.firebaseapp.com",
        projectId: "new-a6",
        storageBucket: "new-a6.firebasestorage.app",
        messagingSenderId: "147870885951",
        appId: "1:147870885951:web:50ae6057e1b97054e8308a",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);

      // USER
      let currentUser = null;
      onAuthStateChanged(auth, (user) => (currentUser = user));

      // 🧠 LẤY ID
      const params = new URLSearchParams(window.location.search);
      const productId = params.get("id");

      if (!productId) {
        alert("Product not found!");
        window.location.href = "index.html";
      }

      // 📦 LOAD PRODUCT
      const productDiv = document.getElementById("product-detail");

      const docRef = doc(db, "products", productId);
      const docSnap = await getDoc(docRef);

      if (!docSnap.exists()) {
        productDiv.innerHTML = "<p>Product not found</p>";
      } else {
        const p = docSnap.data();

        productDiv.innerHTML = `
    <div class="product">
      <img src="${p.image}">
      <div class="product-content">

        <div class="user-info">
          <img src="https://ui-avatars.com/api/?name=${p.user}" class="avatar">
          <span>${p.user}</span>
        </div>

        <h2>${p.name}</h2>
        <p class="product-price">${Number(p.price).toLocaleString("vi-VN")}₫</p>
        <p>${p.desc}</p>

      </div>
    </div>
  `;
      }

      // 💬 COMMENTS REALTIME
      const commentsRef = collection(db, "products", productId, "comments");

      onSnapshot(commentsRef, (snapshot) => {
        const commentsDiv = document.getElementById("comments");
        commentsDiv.innerHTML = "";

        snapshot.forEach((c) => {
          const data = c.data();

          commentsDiv.innerHTML += `
      <div class="comment">
        <img src="https://ui-avatars.com/api/?name=${data.user}" class="avatar">
        <p><b>${data.user}</b>: ${data.text}</p>
      </div>
    `;
        });
      });

      // ➕ ADD COMMENT
      document.getElementById("send").onclick = async () => {
        if (!currentUser) {
          alert("Login first!");
          return;
        }

        const input = document.getElementById("commentInput");
        const text = input.value.trim();

        if (!text) {
          alert("Write something!");
          return;
        }

        await addDoc(collection(db, "products", productId, "comments"), {
          text: text,
          user: username,
          createdAt: serverTimestamp(),
        });

        input.value = "";
      };
    </script>
  </body>
</html>
