<!doctype html>
<html>
  <head>
    <title>Upload Product</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="upload-form" style="display: none">
      <div class="container">
        <h2>Tải lên sản phẩm</h2>

        <input type="text" id="name" placeholder="Tên sản phẩm" />
        <input type="number" id="price" placeholder="Giá" />
        <textarea id="desc" placeholder="Mô tả"></textarea>
        <input type="text" id="imageUrl" placeholder="Link hình ảnh" />

        <button id="upload">Upload</button>
        <a href="index.html">⬅ Back</a>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

      import {
        getFirestore,
        collection,
        addDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      import {
        getAuth,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import {
        query,
        where,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
      // CONFIG
      const firebaseConfig = {
        apiKey: "AIzaSyBLTbTBct5J8trw8wSaCQ9jMFtzLd0mB3M",
        authDomain: "new-a6.firebaseapp.com",
        projectId: "new-a6",
        storageBucket: "new-a6.firebasestorage.app",
        messagingSenderId: "147870885951",
        appId: "1:147870885951:web:50ae6057e1b97054e8308a",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);

      // ELEMENTS
      const name = document.getElementById("name");
      const price = document.getElementById("price");
      const desc = document.getElementById("desc");
      const imageUrl = document.getElementById("imageUrl");
      const form = document.getElementById("upload-form");

      let currentUser = null;

      // 🔐 CHECK LOGIN
      let username = "";

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          alert("Login first!");
          window.location.href = "login.html";
          return;
        }

        currentUser = user;

        // 🔥 lấy username từ Firestore
        const q = query(collection(db, "users"), where("uid", "==", user.uid));

        const snap = await getDocs(q);

        snap.forEach((doc) => {
          username = doc.data().username;
        });

        document.getElementById("upload-form").style.display = "block";
      });

      // UPLOAD
      document.getElementById("upload").onclick = async () => {
        try {
          if (!name.value || !price.value || !imageUrl.value) {
            alert("Fill all fields!");
            return;
          }

          await addDoc(collection(db, "products"), {
            name: name.value,
            price: price.value,
            desc: desc.value,
            image: imageUrl.value,
            user: username, // ✅ chuẩn
            createdAt: new Date(),
          });

          alert("Uploaded!");
          window.location.href = "index.html";
        } catch (err) {
          console.error(err);
          alert(err.message);
        }
      };
    </script>
  </body>
</html>
