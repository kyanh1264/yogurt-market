<!doctype html>
<html>
  <head>
    <title>Upload Product</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="upload-form" style="display: none">
      <div class="container">
        <h2>Upload Product</h2>

        <input type="text" id="name" placeholder="Product name" />
        <input type="number" id="price" placeholder="Price" />
        <textarea id="desc" placeholder="Description"></textarea>
        <input type="text" id="imageUrl" placeholder="Image URL" />

        <button id="upload">Upload</button>
        <a href="index.html">⬅ Back</a>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

      import {
        getFirestore,
        collection,
        addDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      import {
        getAuth,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      // CONFIG
      const firebaseConfig = {
        apiKey: "AIzaSyBLTbTBct5J8trw8wSaCQ9jMFtzLd0mB3M",
        authDomain: "new-a6.firebaseapp.com",
        projectId: "new-a6",
        storageBucket: "new-a6.firebasestorage.app",
        messagingSenderId: "147870885951",
        appId: "1:147870885951:web:50ae6057e1b97054e8308a",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);

      // ELEMENTS
      const name = document.getElementById("name");
      const price = document.getElementById("price");
      const desc = document.getElementById("desc");
      const imageUrl = document.getElementById("imageUrl");
      const form = document.getElementById("upload-form");

      let currentUser = null;

      // 🔐 CHECK LOGIN
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          alert("Login first!");
          window.location.href = "login.html";
          return;
        }

        currentUser = user;
        form.style.display = "block"; // 👉 hiện form sau khi login
      });

      // UPLOAD
      document.getElementById("upload").onclick = async () => {
        try {
          if (!name.value || !price.value || !imageUrl.value) {
            alert("Fill all fields!");
            return;
          }

          await addDoc(collection(db, "products"), {
            name: name.value,
            price: price.value,
            desc: desc.value,
            image: imageUrl.value,
            user: currentUser.displayName || currentUser.email,
            createdAt: new Date(),
          });

          alert("Uploaded!");
          window.location.href = "index.html";
        } catch (err) {
          console.error(err);
          alert(err.message);
        }
      };
    </script>
  </body>
</html>
